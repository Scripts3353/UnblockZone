<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnblockZone</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d0d0f;
  font-family:sans-serif;
}

button{
  padding:16px 32px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00e5ff;
  color:black;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<button onclick="openCloaked()">Click Me</button>

<script>
function openCloaked(){

  const popup = window.open("about:blank","_blank");

  if(!popup){
    alert("Please allow popups for this site.");
    return;
  }

  popup.document.write(`
  <!DOCTYPE html>
  <html>
  <head>
  <title>UnblockZone</title>
  <style>
  html,body,iframe{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    border:none;
    overflow:hidden;
    background:#0d0d0f;
  }
  </style>
  </head>

  <body>
  <iframe src="${location.origin}${location.pathname.replace('index.html','')}site.html"></iframe>
  </body>

  </html>
  `);

  popup.document.close();
}
</script>

</body>
</html>
